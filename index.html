<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WB Deal Change Impact Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --wix:    #0ea5e9;
    --base44: #8b5cf6;
    --shopify:#65a30d;
    --ionos:  #f97316;
    --bg:     #f0f4f8;
    --surface:#ffffff;
    --border: #e2e8f0;
    --text:   #1e293b;
    --muted:  #94a3b8;
    --sub:    #64748b;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #eef2f7 0%, #e8edf5 40%, #edf1f7 100%);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    padding: 44px 36px;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, #c8d3e0 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.45;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; }

  .header { margin-bottom: 36px; }
  .header-title { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .accent-bar {
    width: 6px; height: 30px;
    background: linear-gradient(180deg, #0ea5e9, #8b5cf6);
    border-radius: 99px; flex-shrink: 0;
  }
  h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.4px; color: #0f172a; }
  .header-sub {
    margin-left: 18px; color: var(--muted);
    font-size: 12px; font-family: 'Space Mono', monospace;
  }

  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    margin-bottom: 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: #f8fafc; }
  th {
    padding: 13px 20px; font-size: 10.5px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); border-bottom: 1px solid var(--border);
    white-space: nowrap; text-align: center;
  }
  th:first-child { text-align: left; }
  tbody tr { border-bottom: 1px solid #f1f5f9; transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8fafc; }
  td { padding: 15px 20px; text-align: center; font-size: 14px; }
  td:first-child { text-align: left; }

  .brand-cell { display: flex; align-items: center; gap: 10px; }
  .brand-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .brand-name { font-weight: 600; color: #0f172a; }
  .mono { font-family: 'Space Mono', monospace; color: #475569; font-size: 13px; }
  .badge-green {
    font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 600;
    color: #16a34a; background: #dcfce7;
    padding: 3px 10px; border-radius: 20px; display: inline-block;
  }

  .deal-wrap { display: flex; align-items: center; justify-content: center; gap: 6px; }
  .deal-input {
    background: #f8fafc; border: 1.5px solid #e2e8f0;
    border-radius: 8px; color: #0f172a;
    font-family: 'Space Mono', monospace; font-size: 13px;
    padding: 6px 10px; width: 80px; text-align: center;
    transition: all 0.2s; outline: none; -moz-appearance: textfield;
  }
  .deal-input::-webkit-outer-spin-button,
  .deal-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .deal-input:focus {
    border-color: #0ea5e9; background: #f0f9ff;
    box-shadow: 0 0 0 3px rgba(14,165,233,0.12);
  }
  .pct-label { color: var(--muted); font-size: 12px; }
  .impact-val { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; }

  .summary-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 32px 36px;
    position: relative; overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
  }
  .glow-1 {
    position: absolute; top: -80px; right: -80px;
    width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(14,165,233,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .glow-2 {
    position: absolute; bottom: -60px; left: 15%;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(139,92,246,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .summary-top {
    display: flex; justify-content: space-between;
    align-items: flex-start; flex-wrap: wrap;
    gap: 24px; margin-bottom: 28px; position: relative;
  }
  .stat-label {
    font-size: 10.5px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
    font-weight: 600; margin-bottom: 6px;
  }
  .stat-value { font-family: 'Space Mono', monospace; font-size: 40px; font-weight: 700; line-height: 1; }
  .required-static { font-family: 'Space Mono', monospace; font-size: 40px; font-weight: 700; line-height: 1; color: #94a3b8; }
  .divider { width: 1px; height: 60px; background: var(--border); align-self: center; }

  .prog-labels {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--muted);
    margin-bottom: 8px; font-family: 'Space Mono', monospace;
  }
  .prog-track {
    height: 10px; background: #f1f5f9; border-radius: 99px;
    overflow: hidden; border: 1px solid #e2e8f0; margin-bottom: 20px;
  }
  .prog-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1), background 0.4s; }

  .mini-bars { display: flex; flex-direction: column; gap: 8px; }
  .mini-row { display: flex; align-items: center; gap: 12px; }
  .mini-label { width: 130px; font-size: 11px; color: var(--sub); font-family: 'Space Mono', monospace; flex-shrink: 0; }
  .mini-track { flex: 1; height: 6px; background: #f1f5f9; border-radius: 99px; overflow: hidden; }
  .mini-fill { height: 100%; border-radius: 99px; opacity: 0.75; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
  .mini-val { width: 44px; font-size: 11px; font-family: 'Space Mono', monospace; text-align: right; }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-title">
      <div class="accent-bar"></div>
      <h1>WB Deal Change Impact Calculator</h1>
    </div>
    <p class="header-sub">Feb 2025 · Adjust deal increases per brand to model EPC impact</p>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Brand</th>
          <th>Feb Sales / QLs</th>
          <th>Volume Increase</th>
          <th>Revenue Share</th>
          <th>Deal Increase (%)</th>
          <th>Impact on Site EPC</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="summary-box">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
    <div class="summary-top">
      <div>
        <p class="stat-label">Total Impact on Site EPC</p>
        <span class="stat-value" id="totalImpact" style="color:#0ea5e9">0.00%</span>
      </div>
      <div class="divider"></div>
      <div>
        <p class="stat-label">Required Impact</p>
        <span class="required-static">10.00%</span>
      </div>
      <div class="divider"></div>
      <div>
        <p class="stat-label">% of Fulfillment</p>
        <span class="stat-value" id="fulfillmentVal">0.0%</span>
      </div>
    </div>

    <div class="prog-labels">
      <span>0%</span>
      <span id="progLabel"></span>
      <span>10%</span>
    </div>
    <div class="prog-track">
      <div class="prog-fill" id="progFill" style="width:0%"></div>
    </div>

    <div class="mini-bars" id="miniBars"></div>
  </div>

</div>
<script>
  const REQUIRED = 10;
  const brandColors = {
    "Wix (US)":       "#0ea5e9",
    "Base44 (WB US)": "#f97316",
    "Shopify (All)":  "#65a30d",
    "Ionos (All)":    "#1e3a8a",
  };
  const data = [
    { brand: "Wix (US)",       febSales: 254, volumeIncrease: 176, revenueShare: 60, dealIncrease: 10 },
    { brand: "Base44 (WB US)", febSales: 86,  volumeIncrease: 128, revenueShare: 18, dealIncrease: 10 },
    { brand: "Shopify (All)",  febSales: 480, volumeIncrease: 185, revenueShare: 11, dealIncrease: 10 },
    { brand: "Ionos (All)",    febSales: 38,  volumeIncrease: 132, revenueShare: 2,  dealIncrease: 10 },
  ];

  function getImpact(row) {
    return ((parseFloat(row.dealIncrease) || 0) / 100) * (row.revenueShare / 100) * 100;
  }

  function buildTable() {
    const tbody = document.getElementById('tableBody');
    data.forEach((row, i) => {
      const color = brandColors[row.brand] || '#94a3b8';
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><div class="brand-cell">
          <div class="brand-dot" style="background:${color}"></div>
          <span class="brand-name">${row.brand}</span>
        </div></td>
        <td><span class="mono">${row.febSales.toLocaleString()}</span></td>
        <td><span class="badge-green">+${row.volumeIncrease}%</span></td>
        <td><span class="mono">${row.revenueShare}%</span></td>
        <td><div class="deal-wrap">
          <input class="deal-input" type="number" data-index="${i}" value="${row.dealIncrease}" min="0" max="999"/>
          <span class="pct-label">%</span>
        </div></td>
        <td><span class="impact-val" style="color:${color}" id="impact-${i}">0.00%</span></td>
      `;
      tbody.appendChild(tr);
    });
    document.querySelectorAll('.deal-input').forEach(input => {
      input.addEventListener('input', e => {
        data[parseInt(e.target.dataset.index)].dealIncrease = e.target.value;
        updateAll();
      });
    });
  }

  function updateAll() {
    let total = 0;
    data.forEach((row, i) => {
      const impact = getImpact(row);
      total += impact;
      const el = document.getElementById(`impact-${i}`);
      if (el) el.textContent = impact.toFixed(2) + '%';
    });

    const fulfillment = (total / REQUIRED) * 100;
    const capped = Math.min(fulfillment, 100);

    document.getElementById('totalImpact').textContent = total.toFixed(2) + '%';

    const fEl = document.getElementById('fulfillmentVal');
    fEl.textContent = fulfillment.toFixed(1) + '%';
    fEl.style.color = fulfillment >= 100 ? '#16a34a' : fulfillment >= 70 ? '#d97706' : '#dc2626';

    const progLabel = document.getElementById('progLabel');
    if (fulfillment >= 100) {
      progLabel.textContent = '✓ Target met';
      progLabel.style.color = '#16a34a';
    } else {
      progLabel.textContent = `${(REQUIRED - total).toFixed(2)}% remaining`;
      progLabel.style.color = '#94a3b8';
    }

    const fill = document.getElementById('progFill');
    fill.style.width = capped + '%';
    fill.style.background = fulfillment >= 100
      ? 'linear-gradient(90deg, #4ade80, #16a34a)'
      : fulfillment >= 70
        ? 'linear-gradient(90deg, #fbbf24, #d97706)'
        : 'linear-gradient(90deg, #0ea5e9, #8b5cf6)';
    fill.style.boxShadow = fulfillment >= 100
      ? '0 0 8px rgba(22,163,74,0.3)'
      : '0 0 8px rgba(14,165,233,0.3)';

    const miniBars = document.getElementById('miniBars');
    miniBars.innerHTML = '';
    data.forEach(row => {
      const impact = getImpact(row);
      const pct = Math.min((impact / REQUIRED) * 100, 100);
      const color = brandColors[row.brand] || '#94a3b8';
      const div = document.createElement('div');
      div.className = 'mini-row';
      div.innerHTML = `
        <span class="mini-label">${row.brand.split(' ')[0]}</span>
        <div class="mini-track"><div class="mini-fill" style="width:${pct}%;background:${color}"></div></div>
        <span class="mini-val" style="color:${color}">${impact.toFixed(2)}%</span>
      `;
      miniBars.appendChild(div);
    });
  }

  buildTable();
  updateAll();
</script>
</body>
</html>
